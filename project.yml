name: SketchSticker

options:
  bundleIdPrefix: com.sketchsticker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ml-stable-diffusion:
    url: https://github.com/apple/ml-stable-diffusion
    branch: main

targets:
  SketchSticker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SketchSticker
    dependencies:
      - package: ml-stable-diffusion
        product: StableDiffusion
      - sdk: PencilKit.framework
      - sdk: CoreML.framework
      - sdk: Accelerate.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sketchsticker.app
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
    info:
      path: SketchSticker/Info.plist
      properties:
        NSPhotoLibraryAddUsageDescription: Save your stickers to Photos
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
